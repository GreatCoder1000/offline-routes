<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Route Planner</title>
    <style>
        :root {
            --blue: #0d6efd;
            --green: #198754;
            --orange: #fd7e14;
            --red: #dc3545;
            --purple: #6f42c1;
            --bg: #eef2f7;
            --text-color: #1f2937;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
        }

        .wrapper {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .08);
        }

        .header {
            background: linear-gradient(135deg, var(--blue), #3b82f6);
            color: white;
            padding: 28px;
            border-radius: 24px 24px 0 0;
        }

        .header h1 {
            font-size: 30px;
            margin: 0;
        }

        .header div {
            opacity: .9;
        }

        .content {
            padding: 20px;
        }

        .pills {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .pill {
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            background: white;
            color: var(--blue);
            border: 2px solid var(--blue);
            transition: .25s;
            font-weight: 600;
            cursor: pointer;
        }

        .pill:hover {
            transform: translateY(-2px);
        }

        .pill.active {
            background: var(--blue);
            color: white;
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #dbe4ef;
            border-radius: 14px;
            transition: .25s;
        }

        input:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 5px rgba(13, 110, 253, .15);
        }

        button.find {
            width: 100%;
            margin-top: 16px;
            border: none;
            background: var(--green);
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background .25s;
        }

        button.find:hover {
            background: #16b34a;
        }

        .summary {
            background: var(--blue);
            color: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 14px;
        }

        .distance, .time {
            font-size: 32px;
            font-weight: bold;
            display: inline-block;
        }

        .step {
            margin-top: 10px;
            padding: 12px;
            background: #fafafa;
            border-radius: 6px;
        }

        .start { border-left: 5px solid var(--green); }
        .road { border-left: 5px solid var(--blue); }
        .change { border-left: 5px solid var(--orange); }
        .signpost { border-left: 5px solid var(--purple); }
        .end { border-left: 5px solid var(--red); }

        .rawpath {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
            word-break: break-word;
        }

        .error {
            color: var(--red);
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <div class="header">
            <h1>Offline Route Planner</h1>
            <div>Roads, Railways, Custom Networks</div>
        </div>
        <div class="content">
            <div class="pills" id="pills"></div>

            <label>Start</label>
            <input id="start" list="nodes">

            <label>Goal</label>
            <input id="goal" list="nodes">

            <datalist id="nodes"></datalist>

            <button class="find" onclick="findRoute()">Find Route</button>

            <div id="output"></div>
            <div id="autoprice"></div>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script>
let current = "Kerala Roads";

/***********************
 UI
************************/

function buildPills() {
    const pills = document.getElementById("pills");
    pills.innerHTML = "";

    Object.keys(DATASETS).forEach(name => {
        const btn = document.createElement("button");
        btn.className = "pill" + (name === current ? " active" : "");
        btn.textContent = name;

        btn.onclick = () => {
            current = name;
            buildPills();
            populateNodes();
        };

        pills.appendChild(btn);
    });
}

function populateNodes() {
    const list = document.getElementById("nodes");
    list.innerHTML = "";

    Object.keys(DATASETS[current].graph).forEach(node => {
        const option = document.createElement("option");
        option.value = node;
        list.appendChild(option);
    });
}

/***********************
 DIJKSTRA
************************/

function shortestPath(start, goal) {
    const graph = DATASETS[current].graph;

    if (!graph[start] || !graph[goal]) {
        return null;
    }

    const dist = {};
    const prev = {};
    const prevEdge = {};

    Object.keys(graph).forEach(node => {
        dist[node] = Infinity;
        prev[node] = null;
    });

    dist[start] = 0;
    const queue = [start];

    while (queue.length) {
        queue.sort((a, b) => dist[a] - dist[b]);
        const node = queue.shift();

        if (node === goal) {
            break;
        }

        for (const edge of graph[node]) {
            const alt = dist[node] + edge.distance;

            if (alt < dist[edge.to]) {
                dist[edge.to] = alt;
                prev[edge.to] = node;
                prevEdge[edge.to] = edge;

                if (!queue.includes(edge.to)) {
                    queue.push(edge.to);
                }
            }
        }
    }

    if (dist[goal] === Infinity) {
        return null;
    }

    const path = [];
    const edges = [];
    let cur = goal;

    while (cur !== start) {
        path.unshift(cur);
        edges.unshift(prevEdge[cur]);
        cur = prev[cur];
    }

    path.unshift(start); // Add start to the path

    return {
        cost: dist[goal],
        path,
        edges
    };
}

/***********************
 DIRECTIONS
************************/

function directions(route) {
    const important = DATASETS[current].important;
    const out = [];

    out.push({
        type: "start",
        text: "🚩 Start at " + route.path[0]
    });

    let currentRoad = null;
    let distance = 0;
    let toward = "";

    for (let i = 0; i < route.edges.length; i++) {
        const edge = route.edges[i];
        const node = route.path[i + 1];

        if (currentRoad === null) {
            currentRoad = edge.road;
            distance = edge.distance;
            toward = edge.toward;
        } else if (edge.road === currentRoad) {
            distance += edge.distance;
        } else {
            out.push({
                type: "road",
                text: `🛣 Follow ${currentRoad} ${toward ? ("toward " + toward) : ""}(${distance} km)`
            });

            out.push({
                type: "change",
                text: `↗ At ${route.path[i]} take ${edge.road}` + (edge.toward ? (" toward " + edge.toward) : "");
            });

            currentRoad = edge.road;
            distance = edge.distance;
            toward = edge.toward;
        }

        if (important.has(node) && node !== route.path[route.path.length - 1]) {
            out.push({
                type: "signpost",
                text: "📍 " + node
            });
        }
    }

    if (currentRoad) {
        out.push({
            type: "road",
            text: `🛣 Follow ${currentRoad} ${toward ? ("toward " + toward) : ""}(${distance} km)`
        });
    }

    out.push({
        type: "end",
        text: "🏁 Arrive at " + route.path.at(-1)
    });

    return out;
}
/***********************
 FIND
************************/

function findRoute() {
    const start = document.getElementById("start").value.trim();
    const goal = document.getElementById("goal").value.trim();
    const autoprice = document.getElementById("autoprice");

    if (!start || !goal) {
        const output = document.getElementById("output");
        output.innerHTML = '<div class="error">Please enter both start and goal locations.</div>';
        autoprice.textContent = '';
        return;
    }

    const result = shortestPath(start, goal);
    const output = document.getElementById("output");

    if (!result) {
        output.innerHTML = '<div class="error">No route found.</div>';
        autoprice.textContent = '';
        return;
    }

    // Calculate total time BEFORE generating HTML
    let totalMinutes = 0;
    result.edges.forEach(edge => {
        const speed = edge.speed || 60; // Default speed to 60 km/h if not defined
        totalMinutes += (edge.distance / speed) * 60; // Convert to minutes
    });

    // Format time display
    const hours = Math.floor(totalMinutes / 60);
    const minutes = Math.round(totalMinutes % 60);
    const seconds = Math.round((totalMinutes * 60) % 60);

    let timeDisplay = [];
    if (hours > 0) timeDisplay.push(`${hours} h`);
    if (minutes > 0) timeDisplay.push(`${minutes} min`);
    if (seconds > 0 && hours === 0 && minutes === 0) timeDisplay.push(`${seconds} sec`);
    
    const totalTimeDisplay = timeDisplay.join(" ");

    // Generate directions
    const steps = directions(result);

    // Build HTML with correct time display
    let html = `
    <div class="summary">
        <div class="distance">${result.cost} km</div>
        <div class="time">${totalTimeDisplay}</div>
        <div>Dataset: ${current}</div>
    </div>
    `;

    steps.forEach(step => {
        html += `
        <div class="step ${step.type}">
            ${step.text}
        </div>
        `;
    });

    html += `
    <div class="rawpath">
        <b>Raw Path:</b><br>
        ${result.path.join(" → ")}
    </div>
    `;

    output.innerHTML = html;

    // Calculate and display auto price
    const price = Math.max(30, Math.ceil(result.cost) * 15 + 15);
    autoprice.innerHTML = `<div style="margin-top: 15px; font-weight: 600; color: var(--green);">Price for 🛺 AUTO: approx ₹${price}</div>`;
}

// Initialize the pills and node list on load
buildPills();
populateNodes();

</script>
</body>
</html>
